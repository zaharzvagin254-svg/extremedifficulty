name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: chmod +x gradlew && ./gradlew build
      - uses: actions/upload-artifact@v3
        with:
          name: extremedifficulty-jar
          path: build/libs/*.jar
