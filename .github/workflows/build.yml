name: Build Mod

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: .\gradlew.bat build
      - uses: actions/upload-artifact@v4
        with:
          name: extremedifficulty-jar
          path: build/libs/*.jar
